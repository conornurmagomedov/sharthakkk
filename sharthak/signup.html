<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AfterLife.AI - Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(ellipse at bottom, #0d1b2a 0%, #000 100%);
      overflow-x: hidden;
    }
    .aurora {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 200%;
      height: 200%;
      transform: translate(-50%, -50%);
      background: conic-gradient(from 180deg, #6a5acd, #00ffff, #6a5acd);
      filter: blur(200px);
      animation: auroraMove 20s infinite linear;
      opacity: 0.35;
      z-index: -1;
    }
    @keyframes auroraMove {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">

  <!-- Background -->
  <div class="aurora"></div>

  <!-- Sign Up Card -->
  <div class="glass p-8 rounded-2xl shadow-lg max-w-md w-full text-center">
    <h2 class="text-3xl font-bold text-cyan-300 mb-6">Create Your Account</h2>
    <form class="space-y-5">
      <div>
        <input type="text" placeholder="Full Name" class="w-full p-3 rounded-lg bg-transparent border border-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-300"/>
      </div>
      <div>
        <input type="email" placeholder="Email" class="w-full p-3 rounded-lg bg-transparent border border-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-300"/>
      </div>
      <div>
        <input type="password" placeholder="Password" class="w-full p-3 rounded-lg bg-transparent border border-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-300"/>
      </div>
      <button type="submit" class="w-full bg-gradient-to-r from-cyan-400 to-blue-500 py-3 rounded-lg font-semibold hover:scale-105 transition">
        Sign Up
      </button>
    </form>

    <div class="my-6 text-gray-400">— or —</div>

    <!-- Google Sign In -->
    <button onclick="googleSignIn()" class="flex items-center justify-center gap-3 w-full glass py-3 rounded-lg hover:scale-105 transition">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-6 h-6"/>
      <span>Sign Up with Google</span>
    </button>

    <p class="mt-6 text-gray-400 text-sm">
      Already have an account? <a href="login.html" class="text-cyan-300 hover:underline">Log In</a>
    </p>
  </div>

    // For demo (without Firebase)
    window.googleSignIn = function() {
      alert("Google Sign-In clicked. Connect Firebase to enable this feature.");

</body>
</html>
